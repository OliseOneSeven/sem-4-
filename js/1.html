<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style type="text/css">
        span{
            color:red;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <h1>Registration Form</h1>
    <form id="reg">
        <table>
            <thead>
                <tr>
                    <td>Username:</td>
                    <td><input type="text" name="username" id="reg_username" />
                        <br /><span id="msg_username"></span>
                    </td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" name="password" id="reg_password" />
                        <br /><span id="msg_password"></span>
                    </td>
                </tr>
                <tr>
                    <td>Confirm Password:</td>
                    <td><input type="password" name="confirm_password" id="reg_confirm_password" />
                        <br /><span id="msg_confirm_password"></span>
                    </td>
                </tr>
                <tr>
                    <td>Hobbies:</td>
                    <td>
                        <input type="checkbox" name="hobbies[]" id="reg_hobbies_read" /> <label for="reg_hobbies_read">Read</label><br />
                        <input type="checkbox" name="hobbies[]" id="reg_hobbies_sports" /> <label for="reg_hobbies_sports">Sports</label><br />
                        <input type="checkbox" name="hobbies[]" id="reg_hobbies_music" /> <label for="reg_hobbies_music">Music</label><br />
                    <br /><span id="msg_hobbies"></span>
                    </td>
                </tr>
                <tr>
                    <td>&nbsp;</td>
                    <td><button type="submit">Submit</button> <button type="reset">Reset</button></td>
                </tr>
            </thead>
        </table>
    </form>
    <script>
        let reg = document.getElementById("reg");

        reg.addEventListener('submit', (e) => {
            e.preventDefault();
            try{
                let usernameEle = document.querySelector("#reg_username");
                let usernameErrEle = document.querySelector("#msg_username");
                

                let passwordEle = document.querySelector("#reg_password");
                let passwordErrEle = document.querySelector("#msg_password");
                
                let confirmPasswordEle = document.querySelector("#reg_confirm_password");
                let confirmPasswordErrEle = document.querySelector("#msg_confirm_password");
                
                let hobbiesEle = document.querySelectorAll('input[name="hobbies[]"]:checked');
                let hobbiesErrEle = document.querySelector("#msg_hobbies");
                
                let isValid = true;

                if(usernameEle.value.trim() == ''){
                    usernameErrEle.innerHTML = "Required.";
                    isValid = false;
                } else if(usernameEle.value.trim().length < 6) {
                    usernameErrEle.innerHTML = "Username must be atleast of 6 characters.";
                    isValid = false;
                } else {
                    usernameErrEle.innerHTML = "";
                }

                if (passwordEle.value == '') {
                    passwordErrEle.innerHTML = "Required.";
                    isValid = false;
                } else if (passwordEle.value.length < 6) {
                    passwordErrEle.innerHTML = "Password must be atleast of 6 characters.";
                    isValid = false;
                } else {
                    passwordErrEle.innerHTML = "";
                }

                if (confirmPasswordEle.value == '') {
                    confirmPasswordErrEle.innerHTML = "Required.";
                    isValid = false;
                } else if (confirmPasswordEle.value != passwordEle.value) {
                    confirmPasswordErrEle.innerHTML = "Both password must be same.";
                    isValid = false;
                } else {
                    confirmPasswordErrEle.innerHTML = "";
                }

                console.log(hobbiesEle);
                if(hobbiesEle.length == 0) {
                    hobbiesErrEle.innerHTML = "Atleast one hobbie is required."
                    isValid = false;
                } else {
                    hobbiesErrEle.innerHTML = '';
                }

                if(isValid) {
                   alert("Done"); 
                }

            }catch(e) {
                console.log(e);
            }
        });
    </script>
</body>
</html>

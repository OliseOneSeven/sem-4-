<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration</title>
    <style type="text/css">
        .error {
            color: red;
            font-size: 12px;
        }
    </style>
</head>
<body>
<form id="reg">
    <h1>Course Registration</h1>
    <table>
        <tbody>
            <tr>
                <td>Roll No.</td>
                <td><input type="number" name="rollNo" id="reg_rollNo" /><br />
                    <span class="error" id="err_rollNo"></span>
                </td>
            </tr>
            <tr>
                <td>Student Name</td>
                <td><input type="text" name="name" id="reg_name" /><br />
                <span class="error" id="err_name"></span>
            </td>
            </tr>
            <tr>
                <td>Course</td>
                <td><select name="course" id="reg_course" >
                    <option value="">Select</option>
                    <option value="Javascript">Javascript</option>
                    <option value="Python">Python</option>
                    <option value="PHP">PHP</option>
                </select>
                <br />
                <span class="error" id="err_course"></span>
                </td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender" id="reg_gender_male" /> Male
                    &nbsp;&nbsp;&nbsp;
                    <input type="radio" name="gender" id="reg_gender_female" /> Female
                    <br />
                    <span class="error" id="err_gender"></span>
                </td>
            </tr>
            <tr>
                <td>&nbsp;</td>
                <td>
                    <button type="submit">Submit</button>
                    <button type="reset">Reset</button>
                </td>
            </tr>
        </tbody>
    </table>
</form>
<script>
    let reg = document.getElementById("reg");

    reg.addEventListener("submit", (e) => {
        e.preventDefault();
        try {

            let isValid = true;

            let rollNoEle = document.querySelector("#reg_rollNo");
            let rollNoErrEle = document.querySelector("#err_rollNo");

            let nameEle = document.querySelector("#reg_name");
            let nameErrEle = document.querySelector("#err_name");

            let courseEle = document.querySelector("#reg_course");
            let courseErrEle = document.querySelector("#err_course");
            
            let genderEle = document.querySelector('input[name="gender"]:checked');
            let genderErrEle = document.querySelector("#err_gender");


            if(rollNoEle.value.trim() == "") {
                rollNoErrEle.innerHTML = "Required.";
                isValid = false;
            } else {
                rollNoErrEle.innerHTML = "";
            }

            if (nameEle.value.trim() == "") {
                nameErrEle.innerHTML = "Required.";
                isValid = false;
            } else {
                nameErrEle.innerHTML = "";
            }

            if (courseEle.value.trim() == "") {
                courseErrEle.innerHTML = "Required.";
                isValid = false;
            } else {
                courseErrEle.innerHTML = "";
            }

            if (!genderEle) {
                genderErrEle.innerHTML = "Required.";
                isValid = false;
            } else {
                genderErrEle.innerHTML = "";
            }

            if(isValid) {
                alert("Done");
            }

        }catch (e) {
            console.log(e);
        }
    });
</script>
</body>
</html>

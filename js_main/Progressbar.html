<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Bar Control</title>

    <style>
        #container {
            height: 40px;
            border: 1px solid black;
            width: 200px;
        }

        #box {
            display: inline-block;
            height: 40px;
            background-color: lightgreen;
            transition: 1s;
        }
    </style>
</head>
<body>
    <h1>Progress Bar</h1>
    <div id="container">
        <span id="box" style="width: 0%;"></span>
    </div>
    <Br />
    <Br />
    <button id="fast">Fast</button>
    <button id="normal">Normal</button>
    <button id="slow">slow</button>
    <script>

        let box = document.querySelector("#box");

        let fastEle = document.querySelector("#fast");
        let normalEle = document.querySelector("#normal");
        let slowEle = document.querySelector("#slow");

        let myInterval = null;
        fastEle.addEventListener("click", () => {
            let curProgress = parseInt(box.style.width);
            myInterval = setInterval(() => {
                curProgress = curProgress + 10;
                if(curProgress > 100) {
                    curProgress = 100;
                    clearInterval(myInterval);
                }
                box.style.width = curProgress + '%';
            }, 10)      
        });


        normalEle.addEventListener("click", () => {
            let curProgress = parseInt(box.style.width);
            myInterval = setInterval(() => {
                curProgress = curProgress + 10;
                if (curProgress > 100) {
                    curProgress = 100;
                    clearInterval(myInterval);
                }
                box.style.width = curProgress + '%';
            }, 100)
        });


        slowEle.addEventListener("click", () => {
            let curProgress = parseInt(box.style.width);
            myInterval = setInterval(() => {
                curProgress = curProgress + 10;
                if (curProgress > 100) {
                    curProgress = 100;
                    clearInterval(myInterval);
                }
                box.style.width = curProgress + '%';
            }, 1000)
        });
    </script>
</body>
</html>

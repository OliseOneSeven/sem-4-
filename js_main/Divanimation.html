<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Animation Effects</title>
    <style>
        #box {
            border: 1px solid black;
            height: 100px;
            width: 100px;
            transition: 1s;
        }
    </style>
</head>
<body>
    <h1>Div Animation Effects</h1>
    <div id="box">&nbsp;</div>
    <br />
    <button id="rotate">Rotate</button>&nbsp;
    <button id="fade">Fade</button>&nbsp;
    <button id="scale">Scale</button>&nbsp;
    <button id="shape">Shape</button>&nbsp;
    <button id="color">Color</button>

    <script>
        let btnRotate = document.querySelector("#rotate");
        let btnFade = document.querySelector("#fade");
        let btnScale = document.querySelector("#scale");
        let btnShape = document.querySelector("#shape");
        let btnColor = document.querySelector("#color");

        let box = document.querySelector("#box");

        btnRotate.addEventListener("click", function() {
            clearBoxStyle();
            setTimeout(() => {
                box.style.transform ="rotate(360deg)";
            }, 1500)
        });

        btnFade.addEventListener("click", function () {
            clearBoxStyle();
            setTimeout(() => {
                box.style.opacity = "0";
            }, 1500)
        });

        btnScale.addEventListener("click", function () {
            clearBoxStyle();
            setTimeout(() => {
                box.style.transform = "scale(1.5)";
            }, 1500)
        });

        btnShape.addEventListener("click", function () {
            clearBoxStyle();
            setTimeout(() => {
                box.style.borderRadius = "50px";
            }, 1500)
        });

        btnColor.addEventListener("click", function () {
            clearBoxStyle();
            setTimeout(() => {
                box.style.backgroundColor = "red";
            }, 1500)
        });

        function clearBoxStyle () {
            box.style.transform = "";
            box.style.opacity = "";
            box.style.borderRadius = "";
            box.style.backgroundColor = "";
        }
    </script>
</body>
</html>
